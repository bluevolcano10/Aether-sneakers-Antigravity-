@import "https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syncopate:wght@700&display=swap";:root{--color-bg:#070707;--color-bg-alt:#121212;--color-text:#fafafa;--color-text-muted:#8e8e93;--color-accent:#3b82f6;--color-accent-glow:#3b82f666;--color-neon-cyan:#00f0ff;--color-neon-glow:#00f0ff66;--font-display:"Syncopate", sans-serif;--font-body:"Plus Jakarta Sans", sans-serif;--glass-bg:#12121299;--glass-border:#ffffff14}*{box-sizing:border-box;margin:0;padding:0}html,body{background-color:var(--color-bg);color:var(--color-text);font-family:var(--font-body);scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--color-bg)}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--color-accent)}h1,h2,h3,h4,h5,h6{font-family:var(--font-display);letter-spacing:-.05em;text-transform:uppercase;font-weight:700}p{color:var(--color-text-muted);font-size:1rem;line-height:1.6}a{color:inherit;text-decoration:none;transition:color .3s}.custom-cursor{background-color:var(--color-accent);pointer-events:none;z-index:9999;mix-blend-mode:difference;border-radius:50%;width:8px;height:8px;transition:width .2s,height .2s,background-color .2s;position:fixed;transform:translate(-50%,-50%)}.custom-cursor-ring{pointer-events:none;z-index:9998;border:1px solid #ffffff4d;border-radius:50%;width:40px;height:40px;transition:transform 80ms ease-out,width .3s,height .3s,border-color .3s;position:fixed;transform:translate(-50%,-50%)}.custom-cursor-hovered .custom-cursor{background-color:var(--color-neon-cyan);width:16px;height:16px}.custom-cursor-hovered .custom-cursor-ring{border-color:var(--color-accent);background-color:#3b82f60d;width:60px;height:60px}.glass-panel{background:var(--glass-bg);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:12px}input.glass-panel,select.glass-panel{background:#12121266;transition:all .3s cubic-bezier(.16,1,.3,1)}input.glass-panel:focus,select.glass-panel:focus{border-color:var(--color-accent);box-shadow:0 0 15px var(--color-accent-glow);background:#19191999}@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-15px)}to{transform:translateY(0)}}@keyframes scan{0%{transform:translateY(-100%)}50%{transform:translateY(100%)}to{transform:translateY(-100%)}}@keyframes pulse-glow{0%,to{box-shadow:0 0 10px #3b82f64d}50%{box-shadow:0 0 25px #3b82f699,0 0 40px #00f0ff33}}.container{z-index:10;max-width:1400px;margin:0 auto;padding:0 2.5rem;position:relative}.navbar-header{z-index:1000;border-bottom:1px solid #0000;width:100%;padding:2rem 0;transition:all .5s cubic-bezier(.16,1,.3,1);position:fixed;top:0;left:0}.navbar-header.scrolled{-webkit-backdrop-filter:blur(20px);background:#070707b3;border-bottom:1px solid #ffffff0d;padding:1.2rem 0}.navbar-container{justify-content:space-between;align-items:center;display:flex}.nav-logo{font-family:var(--font-display);letter-spacing:-.08em;color:var(--color-text);align-items:center;gap:.5rem;font-size:1.5rem;font-weight:700;display:flex}.nav-logo span{color:var(--color-accent)}.nav-links{align-items:center;gap:2.5rem;display:flex}.nav-item{text-transform:uppercase;letter-spacing:.1em;color:var(--color-text-muted);font-size:.85rem;font-weight:500;transition:color .3s;position:relative}.nav-item:hover,.nav-item.active{color:var(--color-text)}.nav-item:after{content:"";background-color:var(--color-accent);width:0;height:2px;transition:width .3s;position:absolute;bottom:-4px;left:0}.nav-item:hover:after{width:100%}.nav-actions{align-items:center;gap:1.5rem;display:flex}.nav-btn{color:var(--color-text-muted);cursor:pointer;background:0 0;border:none;padding:.5rem;transition:color .3s,transform .2s;position:relative}.nav-btn:hover{color:var(--color-text);transform:scale(1.1)}.cart-count{background-color:var(--color-accent);color:#fff;border-radius:50%;justify-content:center;align-items:center;width:16px;height:16px;font-size:.65rem;font-weight:700;display:flex;position:absolute;top:0;right:0}.hero-section{justify-content:center;align-items:center;min-height:100vh;padding-top:100px;display:flex;position:relative;overflow:hidden}.hero-grid{grid-template-columns:1.1fr .9fr;align-items:center;gap:4rem;width:100%;display:grid}.hero-content{flex-direction:column;gap:2rem;display:flex}.hero-tagline{letter-spacing:.3em;text-transform:uppercase;color:var(--color-accent);font-size:.9rem;font-weight:600}.hero-title{font-size:5rem;line-height:.9;font-family:var(--font-display);background:linear-gradient(135deg,#fff 0%,#888 100%);-webkit-text-fill-color:transparent;-webkit-background-clip:text}.hero-desc{max-width:480px;font-size:1.15rem;font-weight:300}.hero-buttons{gap:1.5rem;margin-top:1rem;display:flex}.btn{text-transform:uppercase;letter-spacing:.15em;cursor:pointer;border:none;border-radius:0;padding:1.2rem 2.5rem;font-size:.85rem;font-weight:600;transition:all .4s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}.btn:disabled{opacity:.4;cursor:not-allowed}.btn-primary{background-color:var(--color-text);color:var(--color-bg);box-shadow:0 4px 20px #ffffff1a}.btn-primary:hover:not(:disabled){background-color:var(--color-accent);color:var(--color-text);box-shadow:0 10px 30px var(--color-accent-glow)}.btn-secondary{color:var(--color-text);background-color:#0000;border:1px solid #fff3}.btn-secondary:hover:not(:disabled){border-color:var(--color-accent);color:var(--color-accent);box-shadow:0 0 20px var(--color-accent-glow)}.bg-canvas-container{z-index:1;pointer-events:none;width:100%;height:100%;position:absolute;top:0;left:0}.hero-canvas-container{justify-content:center;align-items:center;width:100%;height:600px;display:flex;position:relative}.section{z-index:10;padding:8rem 0;position:relative}.section-header{justify-content:space-between;align-items:flex-end;margin-bottom:4rem;display:flex}.section-title{max-width:500px;font-size:2.5rem}.section-subtitle{color:var(--color-accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.75rem;font-size:.85rem}.collections-grid{grid-template-columns:repeat(3,1fr);gap:2rem;display:grid}.collection-card{cursor:pointer;border:1px solid #ffffff0d;border-radius:12px;height:480px;transition:transform .5s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}.collection-img-wrapper{z-index:1;width:100%;height:100%;transition:transform .6s cubic-bezier(.16,1,.3,1);position:absolute;top:0;left:0}.collection-img-wrapper:after{content:"";z-index:2;background:linear-gradient(#0707071a 0%,#07070766 50%,#070707f2 100%);width:100%;height:100%;position:absolute;top:0;left:0}.collection-img{object-fit:cover;width:100%;height:100%;transition:transform .8s}.collection-info{z-index:3;flex-direction:column;gap:.75rem;width:100%;padding:2.5rem;display:flex;position:absolute;bottom:0;left:0}.collection-name{font-size:1.5rem;font-family:var(--font-display);color:var(--color-text)}.collection-desc{color:var(--color-text-muted);font-size:.9rem}.collection-link{text-transform:uppercase;letter-spacing:.15em;color:var(--color-accent);align-items:center;gap:.5rem;margin-top:.5rem;font-size:.8rem;font-weight:600;display:flex}.collection-link svg{transition:transform .3s}.collection-card:hover{border-color:#3b82f64d;transform:translateY(-10px);box-shadow:0 20px 40px #00000080}.collection-card:hover .collection-img{transform:scale(1.08)}.collection-card:hover .collection-link svg{transform:translate(5px)}.products-grid{grid-template-columns:repeat(4,1fr);gap:2rem;display:grid}.product-card{background:#12121266;border:1px solid #ffffff0d;border-radius:12px;flex-direction:column;transition:all .5s cubic-bezier(.16,1,.3,1);display:flex;position:relative;overflow:hidden}.product-img-container{cursor:pointer;background:radial-gradient(circle,#1e1e1ecc 0%,#07070700 70%);justify-content:center;align-items:center;height:280px;display:flex;position:relative;overflow:hidden}.product-3d-preview{opacity:0;pointer-events:none;width:100%;height:100%;transition:opacity .4s;position:absolute;top:0;left:0}.product-card:hover .product-3d-preview{opacity:1}.product-static-img{object-fit:contain;z-index:2;width:80%;height:auto;transition:transform .6s cubic-bezier(.16,1,.3,1),opacity .4s}.product-card:hover .product-static-img{opacity:.1;transform:scale(1.05)rotate(-5deg)}.product-details{border-top:1px solid #ffffff08;flex-direction:column;gap:.75rem;padding:1.5rem;display:flex}.product-meta{justify-content:space-between;align-items:flex-start;display:flex}.product-name{font-size:1rem;font-family:var(--font-display);color:var(--color-text);font-weight:700}.product-price{color:var(--color-text);font-size:1.1rem;font-weight:700;font-family:var(--font-display)}.product-colors{gap:.5rem;display:flex}.color-dot{border:1px solid #fff3;border-radius:50%;width:12px;height:12px}.product-rating{color:#fbbf24;align-items:center;gap:.25rem;font-size:.85rem;display:flex}.quick-add-btn{width:100%;color:var(--color-text);text-transform:uppercase;letter-spacing:.1em;cursor:pointer;background-color:#0000;border:1px solid #ffffff1a;margin-top:.5rem;padding:.9rem;font-size:.75rem;font-weight:600;transition:all .3s}.product-card:hover{background:#12121299;border-color:#3b82f633;transform:translateY(-8px);box-shadow:0 15px 30px #0006}.product-card:hover .quick-add-btn{background-color:var(--color-text);color:var(--color-bg);border-color:var(--color-text)}.product-card:hover .quick-add-btn:hover{background-color:var(--color-accent);color:var(--color-text);border-color:var(--color-accent);box-shadow:0 0 15px var(--color-accent-glow)}.cart-overlay{-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);z-index:2000;opacity:0;pointer-events:none;background:#00000080;width:100%;height:100%;transition:opacity .4s;position:fixed;top:0;left:0}.cart-overlay.open{opacity:1;pointer-events:all}.cart-drawer{-webkit-backdrop-filter:blur(25px);z-index:2001;background:#0a0a0ad9;border-left:1px solid #ffffff14;flex-direction:column;width:480px;height:100%;padding:3rem;transition:transform .5s cubic-bezier(.16,1,.3,1);display:flex;position:fixed;top:0;right:0;transform:translate(100%)}.cart-drawer.open{transform:translate(0)}.cart-header{justify-content:space-between;align-items:center;margin-bottom:3rem;display:flex}.cart-title{font-size:1.5rem}.close-cart-btn{color:var(--color-text-muted);cursor:pointer;background:0 0;border:none;padding:.5rem;transition:color .3s}.close-cart-btn:hover{color:var(--color-text)}.cart-items{flex-direction:column;flex-grow:1;gap:2rem;margin-right:-1rem;padding-right:1rem;display:flex;overflow-y:auto}.cart-item{border-bottom:1px solid #ffffff0d;align-items:center;gap:1.5rem;padding-bottom:1.5rem;display:flex}.cart-item-img{object-fit:contain;background:#ffffff05;border-radius:8px;width:80px;height:80px}.cart-item-details{flex-direction:column;flex-grow:1;gap:.35rem;display:flex}.cart-item-name{font-size:.9rem;font-family:var(--font-display)}.cart-item-price{font-size:.95rem;font-weight:600}.cart-item-controls{align-items:center;gap:1rem;display:flex}.cart-qty-btn{color:var(--color-text);cursor:pointer;background:0 0;border:1px solid #ffffff1a;border-radius:50%;justify-content:center;align-items:center;width:24px;height:24px;font-size:.75rem;transition:all .2s;display:flex}.cart-qty-btn:hover{background-color:var(--color-text);color:var(--color-bg)}.remove-item-btn{color:#ef4444;cursor:pointer;background:0 0;border:none;margin-left:auto;font-size:.8rem}.cart-footer{border-top:1px solid #ffffff14;flex-direction:column;gap:1.5rem;margin-top:3rem;padding-top:2rem;display:flex}.cart-summary-row{justify-content:space-between;font-size:1rem;display:flex}.cart-total-label{color:var(--color-text-muted)}.cart-total-val{font-family:var(--font-display);color:var(--color-text);font-size:1.25rem}.footer{z-index:10;background-color:#030303;border-top:1px solid #ffffff08;padding:6rem 0 3rem;position:relative}.footer-grid{grid-template-columns:2fr repeat(3,1fr);gap:4rem;margin-bottom:4rem;display:grid}.footer-brand{flex-direction:column;gap:1.5rem;display:flex}.footer-desc{max-width:320px;font-size:.95rem}.footer-links-col{flex-direction:column;gap:1.5rem;display:flex}.footer-col-title{color:var(--color-text);letter-spacing:.1em;font-size:.85rem}.footer-links{flex-direction:column;gap:.85rem;list-style:none;display:flex}.footer-link{color:var(--color-text-muted);font-size:.9rem;transition:color .3s}.footer-link:hover{color:var(--color-accent)}.footer-bottom{color:var(--color-text-muted);border-top:1px solid #ffffff0d;justify-content:space-between;align-items:center;padding-top:2rem;font-size:.85rem;display:flex}input[type=range]{background:#ffffff1a;border-radius:2px;outline:none;height:4px}@media (width<=1200px){.hero-title{font-size:4rem}.collections-grid{grid-template-columns:repeat(2,1fr)}.products-grid{grid-template-columns:repeat(3,1fr)}}@media (width<=991px){.hero-grid{grid-template-columns:1fr;gap:2rem}.hero-canvas-container{order:-1;height:450px}.products-grid{grid-template-columns:repeat(2,1fr)}.footer-grid{grid-template-columns:1fr 1fr;gap:3rem}}@media (width<=768px){.container{padding:0 1.5rem}.nav-links{display:none}.hero-title{font-size:3.2rem}.collections-grid,.products-grid{grid-template-columns:1fr}.cart-drawer{width:100%;padding:2rem}}
